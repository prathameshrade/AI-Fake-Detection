<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SignalScope | Live Camera Scan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Manrope:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    <div class="glow glow-a" aria-hidden="true"></div>
    <main class="page">
      <header class="topbar reveal">
        <a href="/" class="brand">SignalScope</a>
        <nav class="nav">
          <a href="/">Upload Lab</a>
          <a href="/live" class="active">Live Camera</a>
          <a href="/about">Method</a>
        </nav>
      </header>

      <header class="hero reveal delay-1">
        <p class="eyebrow">Realtime Check</p>
        <h1>Front Camera Deepfake Scan</h1>
        <p class="subtitle">
          Stream frames from your front camera and get rolling authenticity
          estimates every few seconds.
        </p>
      </header>

      <section class="panel camera-grid reveal delay-2">
        <div>
          <video id="liveVideo" autoplay playsinline muted></video>
          <canvas id="captureCanvas" class="hidden-canvas"></canvas>
        </div>
        <div class="camera-controls">
          <button id="startCamBtn" type="button">Start Camera Analysis</button>
          <button id="stopCamBtn" type="button" class="ghost" disabled>Stop</button>
          <label for="intervalRange">Frame interval (sec)</label>
          <input id="intervalRange" type="range" min="1" max="5" value="2" />
          <div id="liveStatus" class="status">Camera idle.</div>
          <div class="live-card">
            <p class="live-kpi-label">Latest Verdict</p>
            <p id="liveVerdict" class="live-kpi">-</p>
            <p class="live-kpi-label">Deepfake Score</p>
            <p id="liveScore" class="live-kpi">0%</p>
            <p class="live-kpi-label">Confidence</p>
            <p id="liveConfidence" class="live-kpi">0%</p>
            <p id="liveBrief" class="brief-analysis">No live frames analyzed yet.</p>
          </div>
        </div>
      </section>
    </main>

    <script src="/static/live.js" defer></script>
  </body>
</html>
